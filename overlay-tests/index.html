<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Comment Overlay Manual Test</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #f5f5f5;
    }

    body {
      margin: 0;
      padding: 24px;
      min-height: 100vh;
      background: #0d0f14;
    }

    main {
      margin: 0 auto;
      width: min(1182px, 100%);
      transition: width 160ms ease;
    }

    main[data-stage-size="wide"] {
      width: min(1182px, 100%);
    }

    main[data-stage-size="theater"] {
      width: min(960px, 100%);
    }

    main[data-stage-size="compact"] {
      width: min(720px, 100%);
    }

    main[data-stage-size="mobile"] {
      width: min(480px, 100%);
    }

    h1 {
      font-size: 1.35rem;
      margin: 0 0 14px;
      text-align: left;
      letter-spacing: 0;
    }

    .player {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .video-wrapper {
      position: relative;
      aspect-ratio: 1182 / 665;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 32px rgba(0, 0, 0, 0.35);
      background: #000;
    }

    .video-wrapper:fullscreen {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      aspect-ratio: auto;
    }

    video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
      background: #000;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-start;
      background: rgba(20, 20, 20, 0.65);
      padding: 12px 16px;
      border-radius: 8px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
    }

    .control-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-width: 0;
      padding: 10px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.28);
    }

    .control-group-title {
      flex: 0 0 100%;
      margin: 0 0 2px;
      color: #cbd5e1;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .controls label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(20, 20, 20, 0.35);
      padding: 16px;
      border-radius: 8px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field span {
      font-weight: 600;
    }

    .field textarea {
      resize: vertical;
      min-height: 80px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.4);
      color: inherit;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .field textarea:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.3);
    }

    .field textarea.invalid {
      border-color: #f87171;
      box-shadow: 0 0 0 2px rgba(248, 113, 113, 0.25);
    }

    .input-hint {
      margin: 0;
      font-size: 0.85rem;
      color: #cbd5f5;
    }

    select {
      min-height: 34px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      border-radius: 6px;
      background: rgba(15, 23, 42, 0.72);
      color: inherit;
      padding: 6px 28px 6px 10px;
      font: inherit;
    }

    button {
      min-height: 34px;
      background: #1f6feb;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 7px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    button:hover {
      background: #2b7cff;
      border-color: rgba(255, 255, 255, 0.24);
    }

    button:active {
      transform: translateY(1px);
    }

    .button-secondary {
      background: rgba(30, 41, 59, 0.86);
    }

    .button-secondary:hover {
      background: rgba(51, 65, 85, 0.96);
    }

    .button-active {
      background: #0f766e;
      border-color: rgba(45, 212, 191, 0.5);
    }

    .profiler-controls {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .profiler-btn {
      background: #0ea5e9;
      font-size: 0.9rem;
    }

    .profiler-btn:hover {
      background: #0284c7;
    }

    .clear-btn {
      background: #dc2626;
    }

    .clear-btn:hover {
      background: #b91c1c;
    }

    pre {
      background: rgba(20, 20, 20, 0.65);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 2.6rem;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 10px;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .controls {
        padding: 10px;
      }

      .control-group {
        flex-direction: column;
        align-items: stretch;
      }

      .controls label,
      button,
      select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main id="test-stage" data-stage-size="wide">
    <h1>Comment Overlay Engine Demo</h1>
    <section class="player">
      <div class="video-wrapper overlay-container">
        <video
          id="test-video"
          controls
          crossorigin="anonymous"
          preload="metadata"
          autoplay
        >
          <source
            src="./video.mp4"
            type="video/mp4"
          />
          Your browser does not support the HTML5 video element.
        </video>
      </div>

      <div class="toolbar">
        <div class="controls control-group">
          <p class="control-group-title">Case</p>
          <label>
            コメントデータ
            <select id="comment-preset">
              <option value="default">Default sample</option>
              <option value="cat-mario">sm6240144 猫マリオCA</option>
              <option value="wing-monster">sm6240144 羽モンスターCA</option>
              <option value="ender-dragon">sm6240144 05:46 エンダーCA</option>
            </select>
          </label>
          <button type="button" id="cat-mario-jump" class="button-secondary">01:40 猫</button>
          <button type="button" id="wing-monster-jump" class="button-secondary">05:13 羽</button>
          <button type="button" id="ender-dragon-jump" class="button-secondary">05:45 竜</button>
          <button type="button" id="reload-comments">再読込</button>
        </div>

        <div class="controls control-group">
          <p class="control-group-title">Render</p>
          <label>
            <input type="checkbox" id="toggle-visibility" checked />
            コメント表示
          </label>
          <label>
            方向
            <select id="scroll-direction">
              <option value="rtl">右→左</option>
              <option value="ltr">左→右</option>
            </select>
          </label>
          <label>
            影
            <select id="shadow-intensity">
              <option value="none">なし</option>
              <option value="light">弱</option>
              <option value="medium" selected>中</option>
              <option value="strong">強</option>
            </select>
          </label>
          <button type="button" id="stall-emulator" class="button-secondary">ストール</button>
        </div>

        <div class="controls control-group">
          <p class="control-group-title">Viewport</p>
          <button type="button" class="stage-size-button button-active" data-stage-size="wide">100%</button>
          <button type="button" class="stage-size-button button-secondary" data-stage-size="theater">960</button>
          <button type="button" class="stage-size-button button-secondary" data-stage-size="compact">720</button>
          <button type="button" class="stage-size-button button-secondary" data-stage-size="mobile">480</button>
          <button type="button" id="fullscreen-button">全画面</button>
        </div>
      </div>

      <div class="controls profiler-controls">
        <strong>🔬 デバッグプロファイラー</strong>
        <button type="button" id="profiler-stats" class="profiler-btn">統計表示</button>
        <button type="button" id="profiler-download-compact" class="profiler-btn">Compact JSON</button>
        <button type="button" id="profiler-download-raw" class="profiler-btn">Raw JSON</button>
        <button type="button" id="profiler-clear" class="profiler-btn clear-btn">クリア</button>
      </div>

      <div class="field-group">
        <label class="field" for="ng-words-input">
          <span>NGワード (改行区切り)</span>
          <textarea id="ng-words-input" placeholder="例: 草&#10;神"></textarea>
        </label>
        <label class="field" for="ng-regex-input">
          <span>NG正規表現 (改行区切り)</span>
          <textarea
            id="ng-regex-input"
            placeholder="例: ^(?:8|８){4,}$&#10;[wｗ]{3,}"
          ></textarea>
        </label>
        <p id="ng-regex-status" class="input-hint" aria-live="polite"></p>
      </div>

      <div class="status-grid">
        <pre id="status" aria-live="polite"></pre>
        <pre id="settings-status" aria-live="polite"></pre>
        <pre id="viewport-status" aria-live="polite"></pre>
      </div>
    </section>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
